apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-web
  labels:
    app: sample-web
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    # Placeholder host; overlays patch this to env-specific values.
    - host: sample-web.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-web
                port:
                  number: 80
